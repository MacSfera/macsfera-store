<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>МакСфера</title>
<style>
body { margin:0; font-family:-apple-system, BlinkMacSystemFont, sans-serif; background:#fff; color:#111; }
header { padding:20px 40px; border-bottom:1px solid #eee; }
.logo { font-size:22px; font-weight:600; }

.hero { padding:80px 20px; text-align:center; }
.hero img { max-width:300px; display:block; margin:0 auto 20px; }
.hero input, .hero textarea { width:100%; max-width:400px; margin:5px auto; display:block; padding:10px; border:1px solid #ddd; }

.models {
 display:flex;
 gap:20px;
 overflow-x:auto;
 padding:20px 40px;
 border-bottom:1px solid #eee;
}
.model {
 flex:0 0 auto;
 padding:15px 20px;
 border:1px solid #ddd;
 cursor:pointer;
 transition:0.2s;
}
.model:hover {
 transform:scale(1.1);
 background:#111;
 color:#fff;
}

.products { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px; padding:40px; }
.card { border:1px solid #eee; padding:15px; }
.btn { border:1px solid #111; padding:10px; cursor:pointer; text-align:center; }
.btn:hover { background:#111; color:#fff; }

.cart { position:fixed; right:20px; top:20px; border:1px solid #111; padding:10px; cursor:pointer; }
.cart-panel { position:fixed; right:0; top:0; width:300px; height:100%; background:#fff; border-left:1px solid #eee; padding:20px; display:none; }
</style>
</head>
<body>

<header>
 <div class="logo">МакСфера</div>
</header>

<div class="cart" onclick="toggleCart()">Корзина (<span id="cart-count">0</span>)</div>

<section class="hero">
 <img id="hero-img" src="https://via.placeholder.com/300x200">
 <input type="text" placeholder="Вставь ссылку на фото" onchange="changeImage(this.value)">
 <textarea id="hero-text" placeholder="Напиши любой текст" oninput="updateText()"></textarea>
 <h1 id="hero-title">Твой текст здесь</h1>
</section>

<div class="models">
 <div class="model">17 Pro Max</div>
 <div class="model">17 Pro</div>
 <div class="model">17</div>
 <div class="model">17 Air</div>
 <div class="model">17e</div>
 <div class="model">16 Pro Max</div>
 <div class="model">16 Pro</div>
 <div class="model">16</div>
 <div class="model">16E</div>
 <div class="model">SE (2022)</div>
 <div class="model">MacBook</div>
 <div class="model">iPad</div>
 <div class="model">Apple Watch</div>
 <div class="model">AirPods</div>
</div>

<div class="products" id="products"></div>

<div class="cart-panel" id="cart-panel">
 <h3>Корзина</h3>
 <div id="cart-items"></div>
 <h4 id="total"></h4>
 <button class="btn">Оплатить (Stripe / PayPal)</button>
</div>

<script>
const products = [
 {id:1, name:"iPhone 17 Pro Max", price:1499},
 {id:2, name:"iPhone 16 Pro", price:1199},
 {id:3, name:"MacBook Air", price:1299}
];

let cart = [];

function render(){
 const container = document.getElementById('products');
 container.innerHTML = '';
 products.forEach(p=>{
   container.innerHTML += `
   <div class="card">
    <h3>${p.name}</h3>
    <div>€${p.price}</div>
    <div class="btn" onclick="addToCart(${p.id})">Купить</div>
   </div>`;
 });
}

function addToCart(id){
 const item = products.find(p=>p.id===id);
 cart.push(item);
 updateCart();
}

function updateCart(){
 document.getElementById('cart-count').innerText = cart.length;
 let total = 0;
 const items = document.getElementById('cart-items');
 items.innerHTML = '';
 cart.forEach(i=>{
   total += i.price;
   items.innerHTML += `<p>${i.name}</p>`;
 });
 document.getElementById('total').innerText = '€' + total;
}

function toggleCart(){
 const panel = document.getElementById('cart-panel');
 panel.style.display = panel.style.display==='block'?'none':'block';
}

function changeImage(url){
 document.getElementById('hero-img').src = url;
}

function updateText(){
 document.getElementById('hero-title').innerText = document.getElementById('hero-text').value;
}

render();
</script>

</body>
</html>
