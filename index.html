<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>МакСфера</title>

<style>
:root{--text:#111;--sub:#6e6e73}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#fff;color:var(--text)}

header{position:fixed;top:0;left:0;right:0;padding:15px 40px;display:flex;justify-content:space-between;backdrop-filter:blur(20px);background:rgba(255,255,255,0.7);z-index:1000}
.logo{font-weight:600}

.cart{position:fixed;right:20px;top:20px;border:1px solid #111;padding:10px 15px;border-radius:30px;cursor:pointer}

/* HERO */
.hero{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.hero h1{font-size:64px}
.hero p{color:var(--sub);margin-top:10px}
.hero img{width:600px;margin-top:40px;transition:.5s}
.hero img:hover{transform:scale(1.05)}

/* HORIZONTAL SHOWCASE */
.showcase{display:flex;gap:20px;padding:40px;overflow-x:auto}
.showcase::-webkit-scrollbar{display:none}
.item{min-width:220px;padding:20px;border-radius:20px;background:#f5f5f7;text-align:center;cursor:pointer;transition:.3s}
.item:hover{transform:scale(1.05)}
.item img{width:120px;margin-bottom:10px}

/* SECTIONS */
.section{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.section h2{font-size:52px}
.section p{color:var(--sub)}
.section img{width:600px;margin-top:30px;transition:.5s}
.section img:hover{transform:scale(1.05)}

/* PRODUCTS GRID */
.products{padding:100px 40px;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:40px}
.card{text-align:center;transition:.3s}
.card:hover{transform:translateY(-10px)}
.card img{width:200px}
.price{color:var(--sub)}

.btn{margin-top:15px;padding:10px 20px;border-radius:30px;border:1px solid #111;cursor:pointer;display:inline-block}
.btn:hover{background:#111;color:#fff}

.cart-panel{position:fixed;right:-350px;top:0;width:350px;height:100%;background:#fff;padding:30px;transition:.4s;box-shadow:-10px 0 30px rgba(0,0,0,0.1)}
.cart-panel.open{right:0}

.fade{opacity:0;transform:translateY(40px);transition:1s}
.fade.visible{opacity:1;transform:translateY(0)}
</style>
</head>
<body>

<header>
 <div class="logo">МакСфера</div>
</header>

<div class="cart" onclick="toggleCart()">Корзина (<span id="cart-count">0</span>)</div>

<section class="hero fade">
 <h1>iPhone 17 Pro</h1>
 <p>Технологии, которые опережают время</p>
 <img src="REPLACE1">
 <div class="btn" onclick="addToCart('iPhone 17 Pro',1499)">Купить</div>
</section>

<!-- HORIZONTAL SHOWCASE -->
<div class="showcase fade">
 <div class="item"><img src="REPLACE1"><div>17 Pro Max</div></div>
 <div class="item"><img src="REPLACE2"><div>17 Pro</div></div>
 <div class="item"><img src="REPLACE3"><div>17</div></div>
 <div class="item"><img src="REPLACE1"><div>MacBook</div></div>
 <div class="item"><img src="REPLACE2"><div>iPad</div></div>
 <div class="item"><img src="REPLACE3"><div>AirPods</div></div>
</div>

<section class="section fade">
 <h2>Выбери цвет</h2>
 <p>Создан, чтобы выделяться</p>
 <img src="REPLACE2">
</section>

<section class="section fade">
 <h2>Максимальная мощность</h2>
 <p>Для тех, кто требует больше</p>
 <img src="REPLACE3">
</section>

<section class="products fade" id="products"></section>

<div class="cart-panel" id="cart-panel">
 <h2>Корзина</h2>
 <div id="cart-items"></div>
 <h3 id="total"></h3>
</div>

<script>
let cart=[];

const products=[
 {name:'iPhone 17 Pro Max',price:1499,img:'REPLACE1'},
 {name:'iPhone 16 Pro',price:1199,img:'REPLACE3'},
 {name:'MacBook Air',price:1299,img:'REPLACE2'}
];

function render(){
 const el=document.getElementById('products');
 el.innerHTML='';
 products.forEach(p=>{
   el.innerHTML+=`<div class='card'>
     <img src='${p.img}'>
     <h3>${p.name}</h3>
     <div class='price'>€${p.price}</div>
     <div class='btn' onclick="addToCart('${p.name}',${p.price})">Купить</div>
   </div>`;
 });
}

function addToCart(name,price){
 cart.push({name,price});
 updateCart();
}

function updateCart(){
 document.getElementById('cart-count').innerText=cart.length;
 let total=0;
 let html='';
 cart.forEach(i=>{total+=i.price;html+=`<p>${i.name}</p>`});
 document.getElementById('cart-items').innerHTML=html;
 document.getElementById('total').innerText='€'+total;
}

function toggleCart(){
 document.getElementById('cart-panel').classList.toggle('open');
}

const observer=new IntersectionObserver(entries=>{
 entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible')}})
});

document.querySelectorAll('.fade').forEach(el=>observer.observe(el));

render();
</script>

</body>
</html>
