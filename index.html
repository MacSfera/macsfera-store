<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>МакСфера</title>
<style>
body { margin:0; font-family:-apple-system, BlinkMacSystemFont, sans-serif; background:#fff; color:#111; }
header { padding:20px 40px; display:flex; justify-content:space-between; align-items:center; }
.logo { font-size:22px; font-weight:600; }

.hero {
 height:90vh;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 text-align:center;
}
.hero h1 { font-size:56px; margin:0; }
.hero p { color:#666; margin-top:10px; font-size:20px; }
.hero img { width:500px; margin-top:40px; transition:0.4s; }
.hero img:hover { transform:scale(1.05); }

.section {
 padding:100px 20px;
 text-align:center;
}
.section h2 { font-size:40px; margin-bottom:20px; }
.section p { color:#666; }
.section img { width:500px; margin-top:30px; transition:0.4s; }
.section img:hover { transform:scale(1.05); }

.cart {
 position:fixed;
 top:20px;
 right:20px;
 padding:10px 15px;
 border-radius:20px;
 border:1px solid #111;
 cursor:pointer;
}
.cart-panel {
 position:fixed;
 right:0;
 top:0;
 width:300px;
 height:100%;
 background:#fff;
 border-left:1px solid #eee;
 padding:20px;
 display:none;
}
.btn {
 margin-top:20px;
 padding:10px 20px;
 border-radius:20px;
 border:1px solid #111;
 cursor:pointer;
 display:inline-block;
}
.btn:hover { background:#111; color:#fff; }
</style>
</head>
<body>

<header>
 <div class="logo">МакСфера</div>
</header>

<div class="cart" onclick="toggleCart()">Корзина (<span id="cart-count">0</span>)</div>

<section class="hero">
 <h1>iPhone 17 Pro</h1>
 <p>Мощь. Скорость. Совершенство.</p>
 <img src="https://i.imgur.com/placeholder1.png">
 <div class="btn" onclick="addToCart(1)">Купить</div>
</section>

<section class="section">
 <h2>Выбери свой цвет</h2>
 <img src="https://i.imgur.com/placeholder2.png">
</section>

<section class="section">
 <h2>Темный. Мощный.</h2>
 <img src="https://i.imgur.com/placeholder3.png">
</section>

<div class="cart-panel" id="cart-panel">
 <h3>Корзина</h3>
 <div id="cart-items"></div>
 <h4 id="total"></h4>
</div>

<script>
let cart = [];

function addToCart(id){
 cart.push({name:"iPhone 17 Pro", price:1499});
 updateCart();
}

function updateCart(){
 document.getElementById('cart-count').innerText = cart.length;
 let total = 0;
 const items = document.getElementById('cart-items');
 items.innerHTML = '';
 cart.forEach(i=>{
   total += i.price;
   items.innerHTML += `<p>${i.name}</p>`;
 });
 document.getElementById('total').innerText = '€' + total;
}

function toggleCart(){
 const panel = document.getElementById('cart-panel');
 panel.style.display = panel.style.display==='block'?'none':'block';
}
</script>

</body>
</html>
